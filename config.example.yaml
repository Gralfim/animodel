# Volitelný ladicí konfigurák. Spusť: python -m animodel -e animelist.xml -c config.yaml
# Vše má rozumné defaulty; tady jen přepisuješ, co chceš ladit.
# ŽÁDNÉ seznamy atributů — ty se objevují automaticky z dat.

cache_dir: cache
out_dir: output

model:
  shrinkage_k: 8.0          # vyšší = konzervativnější efekty (malé vzorky víc tlumeny)
  min_attr_count: 4.0       # min. efektivní počet titulů, aby atribut vstoupil
  interaction_min_count: 8.0
  interaction_min_lift: 0.30
  interaction_triples: false  # EXPERIMENT: synergie trojic nad jádry nálad
                              # (hierarchický lift nad singly a páry)
  n_clusters: null          # null = auto podle siluety (4–7); nebo napevno např. 5
  aggregate_franchises: true
  side_story_weight: 0.5    # vliv vedlejšího obsahu franšízy (OVA/speciál/side
                            # story) vs. hlavní řady; 1.0 = bez rozlišení
  intensity_lexicon: intensity.yaml  # osa náročnosti (-1 lehké … +1 těžké);
                            # vygeneruj: python -m animodel -e export.xml --gen-intensity
                            # a hodnoty uprav; bez souboru se použije vestavěný default

enrich:
  use_jikan: true           # false = nouzový AniList-only režim (viz --no-jikan);
                            # hodí se při výpadku obou MAL API zdrojů
  # Zdroj MAL dat (Jikan-kompatibilní schéma). Default Tenrai — spolehlivější
  # náhrada Jikanu (identické schéma, společná cache). Pro přepnutí zpět na
  # Jikan stačí odkomentovat druhý řádek:
  anime_api_base_url: https://api.tenrai.org/v1
  # anime_api_base_url: https://api.jikan.moe/v4
  use_anilist: true
  anilist_min_rank: 30      # ignoruj okrajové AniList tagy (rank < 30 %)
  include_studios: true
  include_staff: false      # signál po režisérech/scenáristech (nové) — stojí
                            # navíc 1 Jikan volání na titul (/staff endpoint)
  use_shikimori: false      # další nezávislý zdroj "podobných anime" kandidátů
                            # (viz sources/shikimori.py) — naživo neověřeno,
                            # zkontroluj tvar odpovědi před ostrým zapnutím

recommend:
  high_score: 8.0           # od jaké známky brát titul jako seed
  candidates_per_seed: 25
  max_seeds: 40
  seeds_per_franchise: 2    # max. seedů z jedné franšízy (0 = bez limitu)
  w_taste_fit: 1.0          # váha shody s atributy/náladami
  w_cf: 0.8                 # váha grafu podobnosti („doporučili to tvé oblíbené")
  w_user_cf: 0.6            # váha user-based CF (podobní uživatelé) — vlastní složka
  w_quality: 0.3            # mírná preference vyššího MAL skóre
  min_mal_rec_votes: 5      # ignoruj MAL doporučení s méně hlasy (šum)
  min_anilist_rec_rating: 3 # ignoruj AniList doporučení se slabším ratingem
  min_community: 6.5        # nedoporučuj pod tímto MAL skóre
  top_n: 40
  use_user_cf: false        # user-based CF přes AniList (pomalé)
  # senpai pipeline: discovery přes nišové tituly -> plné seznamy kandidátů
  # -> podobnost na plném překryvu -> pár skutečných senpai
  user_cf_seed_count: 50          # kolik nejméně populárních titulů k discovery
  user_cf_users_per_seed: 100     # kolik sledujících vzorkovat na seed
  user_cf_min_sample_overlap: 2   # min. sdílených nišových seedů pro kvalifikaci
  user_cf_candidate_pool: 200     # kolik kandidátů vyhodnotit na plných seznamech
  user_cf_senpai_count: 20        # kolik senpai vybrat
  user_cf_min_full_overlap: 40    # min. společně ohodnocených titulů (plný překryv)
  user_cf_shrink_k: 50.0          # smrštění podobnosti n/(n+K)
  user_cf_fav_score: 9.0          # od jaké mé známky je titul „oblíbený"
  user_cf_fav_miss_penalty: 0.3   # srážka skóre senpaie, který mé oblíbené nezná
                                  # (ani z PTW); 0.3 = -30 % při nulovém pokrytí,
                                  # 0 = vypnuto
  user_cf_exclude_users: []       # AniList jména vyloučená z hledání senpai
                                  # (vlastní/alt účty). Jméno z MAL exportu se
                                  # vylučuje automaticky — tohle je pro případ,
                                  # že máš na AniListu jinou přezdívku.
